<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario Bros - HTML5</title>
    <style>
        :root {
            --sky-top: #5c94fc;
            --sky-bottom: #87CEEB;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            user-select: none;
            -webkit-user-select: none;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .game-wrapper {
            position: relative;
            border: 4px solid #333;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(0, 150, 255, 0.4), 0 0 80px rgba(0, 150, 255, 0.2);
            overflow: hidden;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .ui-overlay {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
            z-index: 10;
            letter-spacing: 2px;
        }
        .ui-overlay span {
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 14px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .controls-hint {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 11px;
            text-shadow: 1px 1px 0 #000;
            pointer-events: none;
            z-index: 10;
            text-align: center;
            letter-spacing: 1px;
        }

        @media (max-width: 850px) {
            .ui-overlay {
                font-size: 10px;
                gap: 15px;
                top: 5px;
            }
            .ui-overlay span {
                padding: 4px 10px;
            }
            .controls-hint {
                font-size: 9px;
                bottom: 8px;
            }
        }
    </style>
</head>
<body>

    <div class="game-wrapper" id="gameWrapper">
        <canvas id="gameCanvas"></canvas>
        <div class="ui-overlay">
            <span>⭐ MARIO</span>
            <span id="scoreDisplay">000000</span>
            <span>🪙 ×<span id="coinDisplay">00</span></span>
            <span>❤️ <span id="livesDisplay">3</span></span>
        </div>
        <div class="controls-hint">
            🎮 СТРЕЛКИ — движение &nbsp;|&nbsp; ПРОБЕЛ / ВВЕРХ — прыжок &nbsp;|&nbsp; R — рестарт
        </div>
    </div>

    <script>
        (function() {
            // ============ DOM элементы ============
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const wrapper = document.getElementById('gameWrapper');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const coinDisplay = document.getElementById('coinDisplay');
            const livesDisplay = document.getElementById('livesDisplay');

            // ============ Размеры ============
            const BASE_WIDTH = 800;
            const BASE_HEIGHT = 480;
            const TILE_SIZE = 32;
            const COLS = Math.ceil(BASE_WIDTH / TILE_SIZE) + 2;
            const ROWS = Math.ceil(BASE_HEIGHT / TILE_SIZE);

            let scale = 1;

            function resizeCanvas() {
                const maxWidth = Math.min(window.innerWidth - 20, 820);
                const maxHeight = Math.min(window.innerHeight - 20, 520);
                scale = Math.min(maxWidth / BASE_WIDTH, maxHeight / BASE_HEIGHT);
                canvas.width = BASE_WIDTH;
                canvas.height = BASE_HEIGHT;
                canvas.style.width = (BASE_WIDTH * scale) + 'px';
                canvas.style.height = (BASE_HEIGHT * scale) + 'px';
                wrapper.style.width = (BASE_WIDTH * scale + 8) + 'px';
                wrapper.style.height = (BASE_HEIGHT * scale + 8) + 'px';
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // ============ Звуковой движок (Web Audio API) ============
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            let audioCtx = null;

            function ensureAudio() {
                if (!audioCtx) {
                    audioCtx = new AudioCtx();
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            function playBeep(freq, duration, type = 'square', vol = 0.08) {
                if (!audioCtx) return;
                try {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + duration);
                } catch (e) { /* mute */ }
            }

            function sfxJump() { playBeep(200, 0.12, 'square', 0.06);
                playBeep(350, 0.1, 'square', 0.05); }

            function sfxCoin() { playBeep(988, 0.06, 'square', 0.07);
                playBeep(1319, 0.08, 'square', 0.06); }

            function sfxStomp() { playBeep(150, 0.1, 'triangle', 0.08);
                playBeep(80, 0.15, 'triangle', 0.06); }

            function sfxPowerup() { playBeep(523, 0.08, 'square', 0.06);
                playBeep(659, 0.08, 'square', 0.06);
                playBeep(784, 0.08, 'square', 0.06);
                playBeep(1047, 0.15, 'square', 0.07); }

            function sfxDeath() { playBeep(150, 0.3, 'triangle', 0.1);
                playBeep(100, 0.4, 'triangle', 0.1); }

            function sfxBlockBump() { playBeep(180, 0.08, 'triangle', 0.05); }

            function sfxBreak() { playBeep(300, 0.05, 'noise', 0.04);
                playBeep(120, 0.1, 'triangle', 0.06); }

            function sfxFlag() {
                playBeep(523, 0.12, 'square', 0.06);
                playBeep(659, 0.12, 'square', 0.06);
                playBeep(784, 0.12, 'square', 0.06);
                playBeep(1047, 0.2, 'square', 0.07);
            }

            // ============ Состояние игры ============
            let score = 0;
            let coins = 0;
            let lives = 3;
            let gameState = 'playing'; // 'playing' | 'win' | 'dead' | 'gameover'
            let deathTimer = 0;
            let winTimer = 0;
            let screenShake = 0;
            let particles = [];
            let floatingTexts = [];

            // ============ Ввод ============
            const keys = {};
            window.addEventListener('keydown', e => {
                keys[e.code] = true;
                ensureAudio();
                if (e.code === 'KeyR') restartGame();
                if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'ArrowDown') {
                    e.preventDefault();
                }
            });
            window.addEventListener('keyup', e => { keys[e.code] = false; });

            // Тач-кнопки для мобильных
            let touchLeft = false,
                touchRight = false,
                touchJump = false;
            canvas.addEventListener('touchstart', e => {
                e.preventDefault();
                ensureAudio();
                const rect = canvas.getBoundingClientRect();
                for (let i = 0; i < e.touches.length; i++) {
                    const tx = (e.touches[i].clientX - rect.left) / scale;
                    const ty = (e.touches[i].clientY - rect.top) / scale;
                    if (ty > BASE_HEIGHT * 0.55) {
                        if (tx < BASE_WIDTH / 3) touchLeft = true;
                        else if (tx > BASE_WIDTH * 2 / 3) touchRight = true;
                        else touchJump = true;
                    } else {
                        touchJump = true;
                    }
                }
            }, { passive: false });
            canvas.addEventListener('touchmove', e => {
                e.preventDefault();
                touchLeft = false;
                touchRight = false;
                touchJump = false;
                const rect = canvas.getBoundingClientRect();
                for (let i = 0; i < e.touches.length; i++) {
                    const tx = (e.touches[i].clientX - rect.left) / scale;
                    const ty = (e.touches[i].clientY - rect.top) / scale;
                    if (ty > BASE_HEIGHT * 0.55) {
                        if (tx < BASE_WIDTH / 3) touchLeft = true;
                        else if (tx > BASE_WIDTH * 2 / 3) touchRight = true;
                        else touchJump = true;
                    } else {
                        touchJump = true;
                    }
                }
            }, { passive: false });
            canvas.addEventListener('touchend', e => {
                e.preventDefault();
                touchLeft = false;
                touchRight = false;
                touchJump = false;
                const rect = canvas.getBoundingClientRect();
                for (let i = 0; i < e.touches.length; i++) {
                    const tx = (e.touches[i].clientX - rect.left) / scale;
                    const ty = (e.touches[i].clientY - rect.top) / scale;
                    if (ty > BASE_HEIGHT * 0.55) {
                        if (tx < BASE_WIDTH / 3) touchLeft = true;
                        else if (tx > BASE_WIDTH * 2 / 3) touchRight = true;
                        else touchJump = true;
                    } else {
                        touchJump = true;
                    }
                }
            });
            canvas.addEventListener('touchcancel', () => {
                touchLeft = false;
                touchRight = false;
                touchJump = false;
            });

            function isLeft() { return keys['ArrowLeft'] || keys['KeyA'] || touchLeft; }

            function isRight() { return keys['ArrowRight'] || keys['KeyD'] || touchRight; }

            function isJump() { return keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || touchJump; }

            // ============ Уровень (тайловая карта) ============
            // 0=пусто, 1=земля, 2=кирпич, 3=блок-вопрос, 4=труба-верх-лево, 5=труба-верх-право,
            // 6=труба-низ-лево, 7=труба-низ-право, 8=блок-вопрос-использован, 9=флаг-шест, 10=флаг-верх
            const LEVEL_WIDTH = 180; // в тайлах
            const levelData = [];

            function buildLevel() {
                // Инициализируем пустотой
                for (let row = 0; row < ROWS; row++) {
                    levelData[row] = [];
                    for (let col = 0; col < LEVEL_WIDTH; col++) {
                        levelData[row][col] = 0;
                    }
                }

                // Земля (ряды 13 и 14)
                const groundRow = 13;
                for (let col = 0; col < LEVEL_WIDTH; col++) {
                    // Ямы
                    if ((col >= 25 && col <= 28) || (col >= 55 && col <= 57) || (col >= 95 && col <= 98) || (col >= 140 &&
                            col <= 143)) {
                        continue; // пропускаем яму
                    }
                    levelData[groundRow][col] = 1;
                    levelData[groundRow + 1][col] = 1;
                }

                // Блоки с вопросом
                const questionBlocks = [
                    [16, 9],
                    [20, 9],
                    [22, 9],
                    [23, 9],
                    [40, 9],
                    [60, 9],
                    [62, 9],
                    [78, 9],
                    [80, 5],
                    [100, 9],
                    [105, 9],
                    [110, 9],
                    [130, 9],
                ];
                questionBlocks.forEach(([c, r]) => {
                    if (r < ROWS && c < LEVEL_WIDTH) levelData[r][c] = 3;
                });

                // Кирпичные блоки
                const brickBlocks = [
                    [18, 9],
                    [19, 9],
                    [21, 9],
                    [24, 9],
                    [41, 9],
                    [42, 9],
                    [61, 9],
                    [77, 9],
                    [79, 9],
                    [81, 9],
                    [101, 9],
                    [106, 9],
                    [107, 9],
                    [108, 9],
                    [109, 9],
                    [131, 9],
                    [132, 9],
                    [133, 9],
                ];
                brickBlocks.forEach(([c, r]) => {
                    if (r < ROWS && c < LEVEL_WIDTH && levelData[r][c] === 0) levelData[r][c] = 2;
                });

                // Трубы
                function placePipe(col, height) {
                    const baseRow = groundRow - 1;
                    for (let i = 0; i < height; i++) {
                        const r = baseRow - i;
                        if (r >= 0) {
                            levelData[r][col] = (i === 0) ? 4 : 6;
                            levelData[r][col + 1] = (i === 0) ? 5 : 7;
                        }
                    }
                }
                placePipe(10, 2);
                placePipe(32, 3);
                placePipe(48, 2);
                placePipe(70, 4);
                placePipe(90, 2);
                placePipe(120, 3);
                placePipe(150, 2);

                // Флаг в конце
                const flagCol = 170;
                for (let r = 3; r <= groundRow; r++) {
                    levelData[r][flagCol] = 9;
                }
                levelData[3][flagCol] = 10;
            }

            // ============ Игровые объекты ============
            class Player {
                constructor() {
                    this.reset();
                }

                reset() {
                    this.x = 3 * TILE_SIZE;
                    this.y = 11 * TILE_SIZE;
                    this.width = 22;
                    this.height = 30;
                    this.vx = 0;
                    this.vy = 0;
                    this.speed = 4.5;
                    this.jumpForce = -11;
                    this.gravity = 0.55;
                    this.onGround = false;
                    this.facingRight = true;
                    this.animFrame = 0;
                    this.animTimer = 0;
                    this.invincible = 0;
                    this.big = false;
                    this.dead = false;
                }

                update() {
                    if (this.dead) {
                        this.vy += this.gravity;
                        this.y += this.vy;
                        return;
                    }
                    if (this.invincible > 0) this.invincible--;

                    // Горизонтальное движение
                    if (isLeft()) {
                        this.vx = -this.speed;
                        this.facingRight = false;
                    } else if (isRight()) {
                        this.vx = this.speed;
                        this.facingRight = true;
                    } else {
                        this.vx *= 0.7;
                        if (Math.abs(this.vx) < 0.3) this.vx = 0;
                    }

                    // Прыжок
                    if (isJump() && this.onGround) {
                        this.vy = this.jumpForce;
                        this.onGround = false;
                        sfxJump();
                    }
                    // Переменная высота прыжка
                    if (!isJump() && this.vy < -3) {
                        this.vy *= 0.85;
                    }

                    // Гравитация
                    this.vy += this.gravity;
                    if (this.vy > 12) this.vy = 12;

                    // Перемещение по X с проверкой столкновений
                    this.x += this.vx;
                    this.resolveCollisionX();
                    // Перемещение по Y
                    this.y += this.vy;
                    this.onGround = false;
                    this.resolveCollisionY();

                    // Анимация
                    if (this.onGround && Math.abs(this.vx) > 0.5) {
                        this.animTimer++;
                        if (this.animTimer > 5) { this.animTimer = 0;
                            this.animFrame = (this.animFrame + 1) % 4; }
                    } else if (this.onGround) {
                        this.animFrame = 0;
                        this.animTimer = 0;
                    } else {
                        this.animFrame = 2;
                    }

                    // Падение в яму
                    if (this.y > BASE_HEIGHT + 50) {
                        this.die();
                    }

                    // Ограничение слева
                    if (this.x < 0) this.x = 0;
                }

                resolveCollisionX() {
                    const left = Math.floor(this.x / TILE_SIZE);
                    const right = Math.floor((this.x + this.width - 1) / TILE_SIZE);
                    const top = Math.floor(this.y / TILE_SIZE);
                    const bottom = Math.floor((this.y + this.height - 1) / TILE_SIZE);

                    for (let row = top; row <= bottom; row++) {
                        for (let col = left; col <= right; col++) {
                            if (this.isSolid(col, row)) {
                                const tileLeft = col * TILE_SIZE;
                                const tileRight = col * TILE_SIZE + TILE_SIZE;
                                if (this.vx > 0 && this.x + this.width > tileLeft && this.x < tileLeft) {
                                    this.x = tileLeft - this.width;
                                    this.vx = 0;
                                } else if (this.vx < 0 && this.x < tileRight && this.x + this.width > tileRight) {
                                    this.x = tileRight;
                                    this.vx = 0;
                                }
                            }
                        }
                    }
                }

                resolveCollisionY() {
                    const left = Math.floor(this.x / TILE_SIZE);
                    const right = Math.floor((this.x + this.width - 1) / TILE_SIZE);
                    const top = Math.floor(this.y / TILE_SIZE);
                    const bottom = Math.floor((this.y + this.height - 1) / TILE_SIZE);

                    for (let row = top; row <= bottom; row++) {
                        for (let col = left; col <= right; col++) {
                            if (this.isSolid(col, row)) {
                                const tileTop = row * TILE_SIZE;
                                const tileBottom = row * TILE_SIZE + TILE_SIZE;
                                if (this.vy > 0 && this.y + this.height > tileTop && this.y < tileTop) {
                                    this.y = tileTop - this.height;
                                    this.vy = 0;
                                    this.onGround = true;
                                } else if (this.vy < 0 && this.y < tileBottom && this.y + this.height > tileBottom) {
                                    this.y = tileBottom;
                                    this.vy = 0;
                                    // Удар снизу по блоку
                                    this.hitBlockFromBelow(col, row);
                                }
                            }
                        }
                    }
                }

                isSolid(col, row) {
                    if (col < 0 || col >= LEVEL_WIDTH || row < 0 || row >= ROWS) return false;
                    const tile = levelData[row]?.[col] ?? 0;
                    return tile === 1 || tile === 2 || tile === 3 || tile === 4 || tile === 5 || tile === 6 || tile === 7 ||
                        tile === 8 || tile === 9 || tile === 10;
                }

                hitBlockFromBelow(col, row) {
                    if (col < 0 || col >= LEVEL_WIDTH || row < 0 || row >= ROWS) return;
                    const tile = levelData[row][col];
                    if (tile === 3) {
                        // Блок с вопросом
                        levelData[row][col] = 8;
                        coins++;
                        score += 200;
                        sfxCoin();
                        spawnFloatingText(col * TILE_SIZE + TILE_SIZE / 2, row * TILE_SIZE, '+200', '#FFD700');
                        spawnParticles(col * TILE_SIZE + TILE_SIZE / 2, row * TILE_SIZE, '#FFD700', 8);
                    } else if (tile === 2) {
                        // Кирпич — разрушаем
                        levelData[row][col] = 0;
                        score += 50;
                        sfxBreak();
                        spawnParticles(col * TILE_SIZE + TILE_SIZE / 2, row * TILE_SIZE + TILE_SIZE / 2, '#C84C09', 12);
                        screenShake = 4;
                    } else if (tile === 8) {
                        // Уже использован
                        sfxBlockBump();
                    }
                }

                die() {
                    if (this.dead) return;
                    this.dead = true;
                    this.vy = -10;
                    this.vx = 0;
                    lives--;
                    sfxDeath();
                    if (lives <= 0) {
                        gameState = 'gameover';
                    } else {
                        gameState = 'dead';
                        deathTimer = 90;
                    }
                    screenShake = 8;
                }

                draw(ctx, camX) {
                    if (this.dead && gameState !== 'dead') return;
                    // Мигание при неуязвимости
                    if (this.invincible > 0 && Math.floor(this.invincible / 4) % 2 === 0) return;

                    const sx = this.x - camX;
                    const sy = this.y;
                    const cx = sx + this.width / 2;
                    const cy = sy + this.height / 2;

                    ctx.save();
                    if (!this.facingRight) {
                        ctx.translate(cx * 2, 0);
                        ctx.scale(-1, 1);
                        ctx.translate(-cx * 2, 0);
                    }

                    // Тело (красный комбинезон)
                    ctx.fillStyle = '#E52521';
                    ctx.fillRect(sx + 4, sy + 10, 14, 14);
                    // Голова (телесный)
                    ctx.fillStyle = '#FBBF77';
                    ctx.fillRect(sx + 5, sy, 12, 10);
                    // Кепка (красная)
                    ctx.fillStyle = '#E52521';
                    ctx.fillRect(sx + 3, sy - 3, 14, 6);
                    ctx.fillRect(sx + 6, sy - 5, 8, 4);
                    // Глаза
                    ctx.fillStyle = '#000';
                    ctx.fillRect(sx + 12, sy + 3, 3, 3);
                    // Усы
                    ctx.fillStyle = '#5C3A1E';
                    ctx.fillRect(sx + 8, sy + 8, 7, 2);
                    // Ноги
                    ctx.fillStyle = '#2B5AAF';
                    ctx.fillRect(sx + 4, sy + 24, 6, 6);
                    ctx.fillRect(sx + 12, sy + 24, 6, 6);
                    // Обувь
                    ctx.fillStyle = '#5C3A1E';
                    const footOffset = this.onGround ? Math.abs(Math.sin(this.animTimer * 0.5)) * 3 : 0;
                    ctx.fillRect(sx + 3, sy + 28 - footOffset, 8, 4);
                    ctx.fillRect(sx + 11, sy + 28 + footOffset, 8, 4);

                    ctx.restore();

                    // Отладка хитбокса (можно убрать)
                    // ctx.strokeStyle = 'rgba(255,0,0,0.5)'; ctx.strokeRect(sx, sy, this.width, this.height);
                }
            }

            class Enemy {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.width = 24;
                    this.height = 24;
                    this.vx = -1.2;
                    this.vy = 0;
                    this.gravity = 0.5;
                    this.alive = true;
                    this.deadTimer = 0;
                    this.animFrame = 0;
                    this.animTimer = 0;
                }

                update(player, camX) {
                    if (!this.alive) {
                        this.deadTimer--;
                        return this.deadTimer <= 0;
                    }

                    // Активация только когда враг на экране или рядом
                    if (Math.abs(this.x - player.x) > 500) return false;

                    this.vy += this.gravity;
                    this.x += this.vx;
                    this.y += this.vy;

                    // Столкновения
                    const left = Math.floor(this.x / TILE_SIZE);
                    const right = Math.floor((this.x + this.width - 1) / TILE_SIZE);
                    const top = Math.floor(this.y / TILE_SIZE);
                    const bottom = Math.floor((this.y + this.height - 1) / TILE_SIZE);

                    for (let row = top; row <= bottom; row++) {
                        for (let col = left; col <= right; col++) {
                            if (this.isSolid(col, row)) {
                                const tileLeft = col * TILE_SIZE;
                                const tileRight = col * TILE_SIZE + TILE_SIZE;
                                const tileTop = row * TILE_SIZE;
                                const tileBottom = row * TILE_SIZE + TILE_SIZE;
                                // Y столкновение
                                if (this.vy > 0 && this.y + this.height > tileTop && this.y < tileTop) {
                                    this.y = tileTop - this.height;
                                    this.vy = 0;
                                } else if (this.vy < 0 && this.y < tileBottom && this.y + this.height > tileBottom) {
                                    this.y = tileBottom;
                                    this.vy = 0;
                                }
                                // X столкновение
                                if (this.vx > 0 && this.x + this.width > tileLeft && this.x < tileLeft) {
                                    this.x = tileLeft - this.width;
                                    this.vx = -this.vx;
                                } else if (this.vx < 0 && this.x < tileRight && this.x + this.width > tileRight) {
                                    this.x = tileRight;
                                    this.vx = -this.vx;
                                }
                            }
                        }
                    }

                    // Падение в яму
                    if (this.y > BASE_HEIGHT + 50) return true;

                    // Анимация
                    this.animTimer++;
                    if (this.animTimer > 15) { this.animTimer = 0;
                        this.animFrame = (this.animFrame + 1) % 2; }

                    return false;
                }

                isSolid(col, row) {
                    if (col < 0 || col >= LEVEL_WIDTH || row < 0 || row >= ROWS) return false;
                    const tile = levelData[row]?.[col] ?? 0;
                    return tile !== 0 && tile !== 9 && tile !== 10;
                }

                stomp() {
                    this.alive = false;
                    this.deadTimer = 20;
                    score += 100;
                    sfxStomp();
                    spawnFloatingText(this.x + this.width / 2, this.y, '+100', '#FFF');
                }

                draw(ctx, camX) {
                    if (!this.alive) {
                        // Сжатый враг
                        const sx = this.x - camX;
                        ctx.fillStyle = '#8B4513';
                        ctx.fillRect(sx + 2, this.y + 16, this.width - 4, 6);
                        ctx.fillStyle = '#FFD700';
                        ctx.fillRect(sx + 4, this.y + 17, this.width - 8, 3);
                        return;
                    }
                    const sx = this.x - camX;
                    const sy = this.y;
                    // Тело (коричневое)
                    ctx.fillStyle = '#C84C09';
                    ctx.fillRect(sx + 3, sy + 4, 18, 16);
                    // Голова
                    ctx.fillStyle = '#8B4513';
                    ctx.fillRect(sx + 2, sy, 20, 8);
                    ctx.fillRect(sx, sy + 2, 24, 5);
                    // Глаза
                    ctx.fillStyle = '#FFF';
                    ctx.fillRect(sx + 5, sy + 2, 5, 5);
                    ctx.fillRect(sx + 14, sy + 2, 5, 5);
                    ctx.fillStyle = '#000';
                    const eyeX = this.vx > 0 ? 2 : 0;
                    ctx.fillRect(sx + 6 + eyeX, sy + 3, 3, 3);
                    ctx.fillRect(sx + 15 + eyeX, sy + 3, 3, 3);
                    // Ноги
                    const legOff = this.animFrame * 3;
                    ctx.fillStyle = '#5C3A1E';
                    ctx.fillRect(sx + 3, sy + 19, 7, 5 + legOff);
                    ctx.fillRect(sx + 14, sy + 19, 7, 5 - legOff);
                    // Брови (сердитые)
                    ctx.fillStyle = '#3A1A00';
                    ctx.fillRect(sx + 4, sy + 1, 6, 1);
                    ctx.fillRect(sx + 14, sy + 1, 6, 1);
                }
            }

            class CoinEntity {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.width = 16;
                    this.height = 16;
                    this.collected = false;
                    this.animTimer = 0;
                    this.animFrame = 0;
                }

                update() {
                    this.animTimer++;
                    if (this.animTimer > 8) { this.animTimer = 0;
                        this.animFrame = (this.animFrame + 1) % 4; }
                }

                draw(ctx, camX) {
                    if (this.collected) return;
                    const sx = this.x - camX;
                    const sy = this.y;
                    const shimmer = this.animFrame < 2;
                    ctx.fillStyle = shimmer ? '#FFD700' : '#FFA500';
                    ctx.fillRect(sx + 3, sy, 10, 16);
                    ctx.fillStyle = shimmer ? '#FFEC8B' : '#FFD700';
                    ctx.fillRect(sx + 6, sy + 2, 4, 12);
                    ctx.fillStyle = '#B8860B';
                    ctx.fillRect(sx + 7, sy + 4, 2, 8);
                }
            }

            // ============ Глобальные объекты ============
            let player;
            let enemies = [];
            let coinEntities = [];
            let cameraX = 0;

            function spawnFloatingText(x, y, text, color) {
                floatingTexts.push({ x, y, text, color, life: 35, vy: -2.5 });
            }

            function spawnParticles(x, y, color, count) {
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x,
                        y,
                        vx: (Math.random() - 0.5) * 6,
                        vy: (Math.random() - 1) * 8,
                        life: 25 + Math.random() * 20,
                        color,
                        size: 3 + Math.random() * 4,
                    });
                }
            }

            function placeCoinsInLevel() {
                coinEntities = [];
                const coinPositions = [
                    [16, 7],
                    [17, 7],
                    [20, 7],
                    [21, 7],
                    [40, 6],
                    [60, 6],
                    [61, 6],
                    [78, 6],
                    [100, 6],
                    [101, 6],
                    [105, 6],
                    [130, 6],
                    [131, 6],
                    [132, 6],
                    [50, 11],
                    [51, 11],
                    [85, 11],
                    [86, 11],
                    [115, 11],
                    [116, 11],
                    [160, 11],
                    [161, 11],
                    [162, 11],
                ];
                coinPositions.forEach(([c, r]) => {
                    if (r < ROWS && c < LEVEL_WIDTH && levelData[r][c] === 0) {
                        coinEntities.push(new CoinEntity(c * TILE_SIZE + 8, r * TILE_SIZE + 8));
                    }
                });
            }

            function placeEnemies() {
                enemies = [];
                const enemyPositions = [
                    [14, 12],
                    [22, 12],
                    [35, 12],
                    [44, 12],
                    [52, 12],
                    [65, 12],
                    [75, 12],
                    [82, 12],
                    [93, 12],
                    [102, 12],
                    [112, 12],
                    [125, 12],
                    [135, 12],
                    [145, 12],
                    [155, 12],
                    [165, 12],
                ];
                enemyPositions.forEach(([c, r]) => {
                    enemies.push(new Enemy(c * TILE_SIZE, r * TILE_SIZE));
                });
            }

            function restartGame() {
                ensureAudio();
                score = 0;
                coins = 0;
                lives = 3;
                gameState = 'playing';
                deathTimer = 0;
                winTimer = 0;
                screenShake = 0;
                particles = [];
                floatingTexts = [];
                cameraX = 0;
                buildLevel();
                player = new Player();
                placeEnemies();
                placeCoinsInLevel();
                updateUI();
            }

            function updateUI() {
                scoreDisplay.textContent = String(score).padStart(6, '0');
                coinDisplay.textContent = String(coins).padStart(2, '0');
                livesDisplay.textContent = lives;
            }

            // ============ Инициализация ============
            buildLevel();
            player = new Player();
            placeEnemies();
            placeCoinsInLevel();
            updateUI();

            // ============ Игровой цикл ============
            function update() {
                if (gameState === 'gameover') {
                    // Мигание текста
                    return;
                }

                if (gameState === 'dead') {
                    deathTimer--;
                    player.update();
                    if (deathTimer <= 0) {
                        // Перезапуск с той же позиции
                        player.reset();
                        player.invincible = 120;
                        gameState = 'playing';
                        cameraX = Math.max(0, player.x - BASE_WIDTH / 3);
                        // Восстанавливаем врагов вблизи
                        enemies.forEach(e => { e.alive = true;
                            e.deadTimer = 0; });
                    }
                    updateUI();
                    return;
                }

                if (gameState === 'win') {
                    winTimer--;
                    if (winTimer <= 0) {
                        // Следующий "уровень" — перезапускаем с бонусом
                        score += 1000;
                        lives++;
                        restartGame();
                        updateUI();
                    }
                    return;
                }

                player.update();

                // Проверка флага
                const flagCol = 170;
                const flagX = flagCol * TILE_SIZE;
                if (player.x + player.width > flagX && player.x < flagX + TILE_SIZE && player.y < 13 * TILE_SIZE) {
                    gameState = 'win';
                    winTimer = 150;
                    sfxFlag();
                    score += 2000;
                    spawnFloatingText(player.x, player.y, '🏆 +2000', '#FFD700');
                }

                // Обновление врагов
                enemies = enemies.filter(enemy => {
                    const shouldRemove = enemy.update(player, cameraX);
                    if (shouldRemove && enemy.alive) return false;
                    if (!enemy.alive && enemy.deadTimer <= 0) return false;
                    return true;
                });

                // Столкновение игрока с врагами
                if (player.invincible <= 0 && !player.dead) {
                    enemies.forEach(enemy => {
                        if (!enemy.alive) return;
                        const px = player.x;
                        const py = player.y;
                        const pw = player.width;
                        const ph = player.height;
                        const ex = enemy.x;
                        const ey = enemy.y;
                        const ew = enemy.width;
                        const eh = enemy.height;

                        if (px < ex + ew && px + pw > ex && py < ey + eh && py + ph > ey) {
                            // Проверка: прыгает ли игрок сверху?
                            if (player.vy > 0 && py + ph - ey < 18) {
                                // Игрок прыгает на врага
                                enemy.stomp();
                                player.vy = -7;
                                spawnParticles(enemy.x + ew / 2, enemy.y + eh / 2, '#FFD700', 6);
                            } else if (!player.dead) {
                                // Враг ранит игрока
                                player.die();
                            }
                        }
                    });
                }

                // Сбор монет
                coinEntities.forEach(coin => {
                    if (coin.collected) return;
                    const px = player.x;
                    const py = player.y;
                    const pw = player.width;
                    const ph = player.height;
                    if (px < coin.x + coin.width && px + pw > coin.x && py < coin.y + coin.height && py + ph > coin
                        .y) {
                        coin.collected = true;
                        coins++;
                        score += 100;
                        sfxCoin();
                        spawnFloatingText(coin.x, coin.y, '+100', '#FFD700');
                        spawnParticles(coin.x + coin.width / 2, coin.y + coin.height / 2, '#FFD700', 5);
                    }
                });

                // Обновление монет (анимация)
                coinEntities.forEach(coin => coin.update());

                // Камера
                const targetCamX = player.x - BASE_WIDTH / 3;
                cameraX += (targetCamX - cameraX) * 0.12;
                if (cameraX < 0) cameraX = 0;
                const maxCamX = LEVEL_WIDTH * TILE_SIZE - BASE_WIDTH;
                if (cameraX > maxCamX) cameraX = maxCamX;

                // Экранная тряска
                if (screenShake > 0) screenShake *= 0.8;
                if (screenShake < 0.3) screenShake = 0;

                // Частицы
                particles = particles.filter(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.2;
                    p.life--;
                    return p.life > 0;
                });

                // Плавающий текст
                floatingTexts = floatingTexts.filter(ft => {
                    ft.y += ft.vy;
                    ft.life--;
                    return ft.life > 0;
                });

                updateUI();
            }

            function drawBackground(ctx, camX) {
                // Небо (градиент)
                const skyGrad = ctx.createLinearGradient(0, 0, 0, BASE_HEIGHT);
                skyGrad.addColorStop(0, '#5c94fc');
                skyGrad.addColorStop(0.7, '#87CEEB');
                skyGrad.addColorStop(1, '#b8e6ff');
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, BASE_WIDTH, BASE_HEIGHT);

                // Облака
                ctx.fillStyle = '#fff';
                const cloudPositions = [
                    [100, 40],
                    [350, 60],
                    [600, 30],
                    [900, 50],
                    [1200, 40],
                    [1500, 55],
                    [1800, 35],
                    [2100, 45],
                    [2400, 60],
                ];
                cloudPositions.forEach(([cx, cy]) => {
                    const sx = cx - camX * 0.3;
                    if (sx > -100 && sx < BASE_WIDTH + 100) {
                        ctx.fillRect(sx, cy, 60, 25);
                        ctx.fillRect(sx + 15, cy - 15, 35, 40);
                        ctx.fillRect(sx + 30, cy + 5, 40, 20);
                    }
                });

                // Холмы на заднем плане
                ctx.fillStyle = '#7BC67E';
                const hillPositions = [
                    [200, 380],
                    [700, 370],
                    [1300, 385],
                    [1900, 375],
                    [2500, 380]
                ];
                hillPositions.forEach(([hx, hy]) => {
                    const sx = hx - camX * 0.5;
                    if (sx > -200 && sx < BASE_WIDTH + 200) {
                        ctx.beginPath();
                        ctx.ellipse(sx, hy, 140, 80, 0, Math.PI, 0);
                        ctx.fill();
                    }
                });
                ctx.fillStyle = '#6AAF6E';
                hillPositions.forEach(([hx, hy]) => {
                    const sx = hx - camX * 0.5;
                    if (sx > -200 && sx < BASE_WIDTH + 200) {
                        ctx.beginPath();
                        ctx.ellipse(sx + 30, hy + 5, 100, 55, 0, Math.PI, 0);
                        ctx.fill();
                    }
                });
            }

            function drawTile(ctx, col, row, camX) {
                const tile = levelData[row]?.[col] ?? 0;
                if (tile === 0) return;
                const x = col * TILE_SIZE - camX;
                const y = row * TILE_SIZE;
                if (x < -TILE_SIZE || x > BASE_WIDTH + TILE_SIZE) return;

                switch (tile) {
                    case 1: // Земля
                        ctx.fillStyle = '#C84C09';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#8B4513';
                        ctx.fillRect(x, y, TILE_SIZE, 4);
                        ctx.fillRect(x, y + 14, TILE_SIZE, 4);
                        ctx.fillRect(x, y + 28, TILE_SIZE, 4);
                        ctx.fillStyle = '#A0522D';
                        ctx.fillRect(x + 2, y + 5, TILE_SIZE - 4, 8);
                        ctx.fillRect(x + 2, y + 19, TILE_SIZE - 4, 8);
                        // Текстура
                        ctx.fillStyle = '#6B3410';
                        ctx.fillRect(x + 8, y + 2, 2, 2);
                        ctx.fillRect(x + 20, y + 16, 2, 2);
                        ctx.fillRect(x + 14, y + 24, 3, 3);
                        break;
                    case 2: // Кирпич
                        ctx.fillStyle = '#C84C09';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.strokeStyle = '#3A1A00';
                        ctx.lineWidth = 1.5;
                        ctx.strokeRect(x + 1, y + 1, TILE_SIZE - 2, TILE_SIZE - 2);
                        ctx.beginPath();
                        ctx.moveTo(x, y + TILE_SIZE / 2);
                        ctx.lineTo(x + TILE_SIZE, y + TILE_SIZE / 2);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(x + TILE_SIZE / 2, y);
                        ctx.lineTo(x + TILE_SIZE / 2, y + TILE_SIZE / 2);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(x + TILE_SIZE / 4, y + TILE_SIZE / 2);
                        ctx.lineTo(x + TILE_SIZE / 4, y + TILE_SIZE);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(x + TILE_SIZE * 3 / 4, y + TILE_SIZE / 2);
                        ctx.lineTo(x + TILE_SIZE * 3 / 4, y + TILE_SIZE);
                        ctx.stroke();
                        ctx.fillStyle = 'rgba(255,255,255,0.15)';
                        ctx.fillRect(x + 2, y + 2, TILE_SIZE - 4, 5);
                        break;
                    case 3: // Блок-вопрос
                        ctx.fillStyle = '#F5A623';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.strokeStyle = '#8B5E14';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(x + 1, y + 1, TILE_SIZE - 2, TILE_SIZE - 2);
                        ctx.fillStyle = '#FFF';
                        ctx.font = 'bold 18px "Press Start 2P", "Courier New", monospace';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('?', x + TILE_SIZE / 2, y + TILE_SIZE / 2 + 1);
                        ctx.fillStyle = 'rgba(255,255,255,0.2)';
                        ctx.fillRect(x + 2, y + 2, TILE_SIZE - 4, 6);
                        break;
                    case 8: // Использованный блок
                        ctx.fillStyle = '#8B7355';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.strokeStyle = '#5C4033';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(x + 1, y + 1, TILE_SIZE - 2, TILE_SIZE - 2);
                        ctx.fillStyle = 'rgba(0,0,0,0.3)';
                        ctx.fillRect(x + 2, y + 2, TILE_SIZE - 4, 6);
                        break;
                    case 4: // Труба верх-лево
                        ctx.fillStyle = '#2D8B2D';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#3CB043';
                        ctx.fillRect(x + 3, y, TILE_SIZE - 3, TILE_SIZE);
                        ctx.strokeStyle = '#1A5C1A';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(x + 3, y, TILE_SIZE - 3, TILE_SIZE);
                        ctx.fillStyle = 'rgba(255,255,255,0.2)';
                        ctx.fillRect(x + 5, y + 2, 10, 6);
                        break;
                    case 5: // Труба верх-право
                        ctx.fillStyle = '#2D8B2D';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#3CB043';
                        ctx.fillRect(x, y, TILE_SIZE - 3, TILE_SIZE);
                        ctx.strokeStyle = '#1A5C1A';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(x, y, TILE_SIZE - 3, TILE_SIZE);
                        ctx.fillStyle = 'rgba(255,255,255,0.2)';
                        ctx.fillRect(x + 5, y + 2, 10, 6);
                        break;
                    case 6: // Труба низ-лево
                        ctx.fillStyle = '#2D8B2D';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#3CB043';
                        ctx.fillRect(x + 3, y, TILE_SIZE - 3, TILE_SIZE);
                        ctx.strokeStyle = '#1A5C1A';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(x + 3, y, TILE_SIZE - 3, TILE_SIZE);
                        break;
                    case 7: // Труба низ-право
                        ctx.fillStyle = '#2D8B2D';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#3CB043';
                        ctx.fillRect(x, y, TILE_SIZE - 3, TILE_SIZE);
                        ctx.strokeStyle = '#1A5C1A';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(x, y, TILE_SIZE - 3, TILE_SIZE);
                        break;
                    case 9: // Флаг-шест
                        ctx.fillStyle = '#4A4A4A';
                        ctx.fillRect(x + 13, y, 6, TILE_SIZE);
                        ctx.fillStyle = '#666';
                        ctx.fillRect(x + 14, y, 4, TILE_SIZE);
                        break;
                    case 10: // Флаг-верх (зелёный флаг)
                        ctx.fillStyle = '#4A4A4A';
                        ctx.fillRect(x + 13, y, 6, TILE_SIZE);
                        ctx.fillStyle = '#3CB043';
                        ctx.fillRect(x + 6, y + 4, 20, 14);
                        ctx.fillStyle = '#FFF';
                        ctx.fillRect(x + 8, y + 8, 6, 6);
                        // Шарик наверху
                        ctx.fillStyle = '#FFD700';
                        ctx.fillRect(x + 12, y - 4, 10, 10);
                        ctx.fillStyle = '#FFEC8B';
                        ctx.fillRect(x + 13, y - 3, 6, 6);
                        break;
                }
            }

            function drawLevel(ctx, camX) {
                const startCol = Math.floor(camX / TILE_SIZE) - 1;
                const endCol = Math.floor((camX + BASE_WIDTH) / TILE_SIZE) + 2;
                for (let row = 0; row < ROWS; row++) {
                    for (let col = startCol; col <= endCol; col++) {
                        drawTile(ctx, col, row, camX);
                    }
                }
            }

            function render() {
                ctx.clearRect(0, 0, BASE_WIDTH, BASE_HEIGHT);

                // Тряска камеры
                const shakeX = (Math.random() - 0.5) * screenShake * 2;
                const shakeY = (Math.random() - 0.5) * screenShake * 2;
                const effectiveCamX = cameraX + shakeX;

                ctx.save();
                ctx.translate(shakeX, shakeY);

                drawBackground(ctx, effectiveCamX);
                drawLevel(ctx, effectiveCamX);

                // Монеты
                coinEntities.forEach(coin => coin.draw(ctx, effectiveCamX));

                // Враги
                enemies.forEach(enemy => enemy.draw(ctx, effectiveCamX));

                // Игрок
                if (gameState !== 'gameover') {
                    player.draw(ctx, effectiveCamX);
                }

                // Частицы
                particles.forEach(p => {
                    const sx = p.x - effectiveCamX;
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life / 30;
                    ctx.fillRect(sx - p.size / 2, p.y - p.size / 2, p.size, p.size);
                });
                ctx.globalAlpha = 1;

                // Плавающий текст
                floatingTexts.forEach(ft => {
                    const sx = ft.x - effectiveCamX;
                    ctx.fillStyle = ft.color;
                    ctx.globalAlpha = ft.life / 35;
                    ctx.font = 'bold 16px "Press Start 2P", "Courier New", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText(ft.text, sx, ft.y);
                });
                ctx.globalAlpha = 1;

                ctx.restore();

                // Затемнение краёв (виньетка)
                const vignetteGrad = ctx.createRadialGradient(BASE_WIDTH / 2, BASE_HEIGHT / 2, BASE_WIDTH * 0.4, BASE_WIDTH / 2,
                    BASE_HEIGHT / 2, BASE_WIDTH * 0.75);
                vignetteGrad.addColorStop(0, 'rgba(0,0,0,0)');
                vignetteGrad.addColorStop(1, 'rgba(0,0,0,0.35)');
                ctx.fillStyle = vignetteGrad;
                ctx.fillRect(0, 0, BASE_WIDTH, BASE_HEIGHT);

                // Сообщения о состоянии
                if (gameState === 'gameover') {
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(0, 0, BASE_WIDTH, BASE_HEIGHT);
                    ctx.fillStyle = '#FFF';
                    ctx.font = 'bold 28px "Press Start 2P", "Courier New", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText('GAME OVER', BASE_WIDTH / 2, BASE_HEIGHT / 2 - 20);
                    ctx.font = '14px "Press Start 2P", "Courier New", monospace';
                    ctx.fillText('Нажмите R для рестарта', BASE_WIDTH / 2, BASE_HEIGHT / 2 + 30);
                    ctx.fillText('Счёт: ' + String(score).padStart(6, '0'), BASE_WIDTH / 2, BASE_HEIGHT / 2 + 55);
                } else if (gameState === 'win') {
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(0, 0, BASE_WIDTH, BASE_HEIGHT);
                    ctx.fillStyle = '#FFD700';
                    ctx.font = 'bold 26px "Press Start 2P", "Courier New", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText('⭐ УРОВЕНЬ ПРОЙДЕН! ⭐', BASE_WIDTH / 2, BASE_HEIGHT / 2);
                    ctx.fillStyle = '#FFF';
                    ctx.font = '12px "Press Start 2P", "Courier New", monospace';
                    ctx.fillText('+2000 очков! +1 жизнь!', BASE_WIDTH / 2, BASE_HEIGHT / 2 + 35);
                } else if (gameState === 'dead') {
                    ctx.fillStyle = 'rgba(0,0,0,0.4)';
                    ctx.fillRect(0, 0, BASE_WIDTH, BASE_HEIGHT);
                    ctx.fillStyle = '#FFF';
                    ctx.font = 'bold 18px "Press Start 2P", "Courier New", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText('Жизней: ' + lives, BASE_WIDTH / 2, BASE_HEIGHT / 2);
                }
            }

            function gameLoop() {
                update();
                render();
                requestAnimationFrame(gameLoop);
            }

            // ============ Запуск ============
            updateUI();
            gameLoop();

            console.log('🎮 Super Mario Bros - HTML5 готов!');
            console.log('🕹️ Управление: Стрелки / WASD — движение, Пробел / Вверх — прыжок, R — рестарт');
            console.log('📱 Поддержка тач-управления: левая часть экрана — влево, правая — вправо, верх/центр — прыжок');
            console.log('🏁 Доберитесь до флага в конце уровня!');
            console.log('⚠️ Остерегайтесь врагов и ям!');
            console.log('💡 Ударяйте блоки с вопросом снизу, собирайте монеты!');
        })();
    </script>
</body>
</html>
